<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="/style.css">
    <head>
        <title> Compatibility between tanker and receiver</title>
    </head>
    <body>
        <h1>
            Here you can check the compatibility between tanker and receiver
        </h1>


        <form action="compatibility/submit" method="POST">
            <label>Tanker Nation:</label>
            <input type="text" name="tankerNation" required>

            <label>Tanker Type:</label>
            <input type="text" name="tankerType" required>

            <label>Tanker Model:</label>
            <input type="text" name="tankerModel" required>

            <label>Receiver Nation:</label>
            <input type="text" name="receiverNation" required>

            <label>Receiver Type:</label>
            <input type="text" name="receiverType" required>

            <label>Receiver Model:</label>
            <input type="text" name="receiverModel" required>

            <button type="submit">Search</button>
        </form>
